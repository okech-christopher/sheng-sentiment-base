version: '3.8'

services:
  sheng-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - sheng-network

  sheng-dashboard:
    build: .
    command: streamlit run demo_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
    depends_on:
      sheng-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sheng-network

networks:
  sheng-network:
    driver: bridge

volumes:
  data-volume:
    driver: local
